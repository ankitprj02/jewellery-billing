spring.application.name=jewellery-billing

# Load local overrides (MySQL password) — copy application-local.properties.example first
spring.config.import=optional:classpath:application-local.properties

# Server
server.port=${PORT:8080}

# Database (Supabase / local PostgreSQL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/jewellery_billing}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:JewelleryShopBillingSecretKey2024MustBeAtLeast256BitsLongForHS256Algorithm}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000}

# File upload
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Google Authentication
google.client.id=${GOOGLE_CLIENT_ID:616229059191-fim7a642ltg78iik64f1b41qifnokh75.apps.googleusercontent.com}
