<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - JewelBill</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/common.js"></script>
    <script>
        if (!checkAuth()) throw new Error('Unauthorized');
        document.getElementById('app').innerHTML = getLayoutHTML('dashboard', 'Dashboard');
        initDarkMode();

        async function loadDashboard() {
            try {
                const res = await Api.get('/dashboard/stats');
                const stats = res.data;
                document.getElementById('pageContent').innerHTML = `
                    <div class="row g-3 mb-4">
                        <div class="col-sm-6 col-xl-3">
                            <div class="card stat-card h-100"><div class="card-body d-flex align-items-center gap-3">
                                <div class="stat-icon customers"><i class="bi bi-people"></i></div>
                                <div><div class="text-muted small">Total Customers</div><h3 class="mb-0">${stats.totalCustomers}</h3></div>
                            </div></div>
                        </div>
                        <div class="col-sm-6 col-xl-3">
                            <div class="card stat-card h-100"><div class="card-body d-flex align-items-center gap-3">
                                <div class="stat-icon products"><i class="bi bi-box-seam"></i></div>
                                <div><div class="text-muted small">Total Products</div><h3 class="mb-0">${stats.totalProducts}</h3></div>
                            </div></div>
                        </div>
                        <div class="col-sm-6 col-xl-3">
                            <div class="card stat-card h-100"><div class="card-body d-flex align-items-center gap-3">
                                <div class="stat-icon invoices"><i class="bi bi-receipt"></i></div>
                                <div><div class="text-muted small">Total Invoices</div><h3 class="mb-0">${stats.totalInvoices}</h3></div>
                            </div></div>
                        </div>
                        <div class="col-sm-6 col-xl-3">
                            <div class="card stat-card h-100"><div class="card-body d-flex align-items-center gap-3">
                                <div class="stat-icon revenue"><i class="bi bi-currency-rupee"></i></div>
                                <div><div class="text-muted small">Total Revenue</div><h3 class="mb-0">${formatCurrency(stats.totalRevenue)}</h3></div>
                            </div></div>
                        </div>
                    </div>
                    <div class="row g-4">
                        <div class="col-lg-7">
                            <div class="card table-card"><div class="card-header bg-transparent"><h5 class="mb-0">Sales Analytics</h5></div>
                                <div class="card-body"><canvas id="salesChart" height="200"></canvas></div>
                            </div>
                        </div>
                        <div class="col-lg-5">
                            <div class="card table-card"><div class="card-header bg-transparent"><h5 class="mb-0">Recent Invoices</h5></div>
                                <div class="card-body p-0"><div class="table-responsive">
                                    <table class="table table-hover mb-0">
                                        <thead><tr><th>Invoice #</th><th>Customer</th><th>Amount</th></tr></thead>
                                        <tbody>${(stats.recentInvoices || []).map(inv => `
                                            <tr>
                                                <td><a href="invoice-history.html?id=${inv.id}">${inv.invoiceNumber}</a></td>
                                                <td>${inv.customer.name}</td>
                                                <td>${formatCurrency(inv.grandTotal)}</td>
                                            </tr>`).join('') || '<tr><td colspan="3" class="text-center text-muted">No invoices yet</td></tr>'}
                                        </tbody>
                                    </table>
                                </div></div>
                            </div>
                        </div>
                    </div>`;

                const sales = stats.monthlySales || {};
                const labels = Object.keys(sales);
                const values = Object.values(sales).map(v => parseFloat(v));
                new Chart(document.getElementById('salesChart'), {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{ label: 'Revenue (₹)', data: values, backgroundColor: 'rgba(184,134,11,0.7)', borderRadius: 6 }]
                    },
                    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
                });
            } catch (err) {
                showToast(err.message, 'error');
            }
        }
        loadDashboard();
    </script>
</body>
</html>
