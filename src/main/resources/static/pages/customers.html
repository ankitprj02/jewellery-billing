<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - JewelBill</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
    <div id="app"></div>

    <div class="modal fade" id="customerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Customer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="customerForm">
                    <div class="modal-body">
                        <input type="hidden" id="customerId">
                        <div class="mb-3">
                            <label class="form-label">Name *</label>
                            <input type="text" class="form-control" id="name" required maxlength="100">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mobile Number *</label>
                            <input type="tel" class="form-control" id="mobileNumber" required pattern="[0-9]{10}" maxlength="10">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" id="address" rows="2" maxlength="500"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-gold">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="viewModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Customer Details</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body" id="viewContent"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/common.js"></script>
    <script>
        if (!checkAuth()) throw new Error('Unauthorized');
        document.getElementById('app').innerHTML = getLayoutHTML('customers', 'Customer Management');
        initDarkMode();

        const modal = new bootstrap.Modal(document.getElementById('customerModal'));
        const viewModal = new bootstrap.Modal(document.getElementById('viewModal'));
        let customers = [];

        document.getElementById('pageContent').innerHTML = `
            <div class="card table-card">
                <div class="card-header bg-transparent d-flex flex-wrap gap-2 justify-content-between align-items-center">
                    <div class="input-group" style="max-width:300px">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" id="searchInput" placeholder="Search customers...">
                    </div>
                    <button class="btn btn-gold" onclick="openAddModal()"><i class="bi bi-plus-lg me-1"></i>Add Customer</button>
                </div>
                <div class="card-body p-0"><div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead><tr><th>ID</th><th>Name</th><th>Mobile</th><th>Address</th><th>Created</th><th>Actions</th></tr></thead>
                        <tbody id="customerTable"></tbody>
                    </table>
                </div></div>
            </div>`;

        async function loadCustomers(search = '') {
            try {
                const endpoint = search ? `/customers?search=${encodeURIComponent(search)}` : '/customers';
                const res = await Api.get(endpoint);
                customers = res.data;
                renderTable();
            } catch (err) { showToast(err.message, 'error'); }
        }

        function renderTable() {
            document.getElementById('customerTable').innerHTML = customers.length
                ? customers.map(c => `<tr>
                    <td>${c.id}</td><td>${c.name}</td><td>${c.mobileNumber}</td>
                    <td>${c.address || '-'}</td><td>${formatDate(c.createdDate)}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-info" onclick="viewCustomer(${c.id})"><i class="bi bi-eye"></i></button>
                        <button class="btn btn-sm btn-outline-primary" onclick="editCustomer(${c.id})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteCustomer(${c.id})"><i class="bi bi-trash"></i></button>
                    </td></tr>`).join('')
                : '<tr><td colspan="6" class="text-center text-muted py-4">No customers found</td></tr>';
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add Customer';
            document.getElementById('customerForm').reset();
            document.getElementById('customerId').value = '';
            modal.show();
        }

        function editCustomer(id) {
            const c = customers.find(x => x.id === id);
            document.getElementById('modalTitle').textContent = 'Edit Customer';
            document.getElementById('customerId').value = c.id;
            document.getElementById('name').value = c.name;
            document.getElementById('mobileNumber').value = c.mobileNumber;
            document.getElementById('address').value = c.address || '';
            modal.show();
        }

        function viewCustomer(id) {
            const c = customers.find(x => x.id === id);
            document.getElementById('viewContent').innerHTML = `
                <p><strong>ID:</strong> ${c.id}</p>
                <p><strong>Name:</strong> ${c.name}</p>
                <p><strong>Mobile:</strong> ${c.mobileNumber}</p>
                <p><strong>Address:</strong> ${c.address || '-'}</p>
                <p><strong>Created:</strong> ${formatDate(c.createdDate)}</p>`;
            viewModal.show();
        }

        async function deleteCustomer(id) {
            if (!confirm('Delete this customer?')) return;
            try {
                await Api.delete(`/customers/${id}`);
                showToast('Customer deleted');
                loadCustomers();
            } catch (err) { showToast(err.message, 'error'); }
        }

        document.getElementById('customerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('customerId').value;
            const body = {
                name: document.getElementById('name').value,
                mobileNumber: document.getElementById('mobileNumber').value,
                address: document.getElementById('address').value
            };
            try {
                if (id) await Api.put(`/customers/${id}`, body);
                else await Api.post('/customers', body);
                modal.hide();
                showToast(id ? 'Customer updated' : 'Customer created');
                loadCustomers();
            } catch (err) { showToast(err.message, 'error'); }
        });

        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => loadCustomers(e.target.value), 300);
        });

        loadCustomers();
    </script>
</body>
</html>
