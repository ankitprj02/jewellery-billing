<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - JewelBill</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
    <div id="app"></div>

    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="productForm">
                    <div class="modal-body">
                        <input type="hidden" id="productId">
                        <div class="mb-3">
                            <label class="form-label">Product Name *</label>
                            <input type="text" class="form-control" id="productName" required maxlength="150">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category *</label>
                            <select class="form-select" id="category" required>
                                <option value="">Select category</option>
                                <option value="Gold">Gold</option>
                                <option value="Silver">Silver</option>
                                <option value="Diamond">Diamond</option>
                                <option value="Platinum">Platinum</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Rate (₹/gram) *</label>
                            <input type="number" class="form-control" id="currentRate" required min="0.01" step="0.01">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" id="description" rows="2" maxlength="1000"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-gold">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/common.js"></script>
    <script>
        if (!checkAuth()) throw new Error('Unauthorized');
        document.getElementById('app').innerHTML = getLayoutHTML('products', 'Product Management');
        initDarkMode();

        const modal = new bootstrap.Modal(document.getElementById('productModal'));
        let products = [];

        document.getElementById('pageContent').innerHTML = `
            <div class="card table-card">
                <div class="card-header bg-transparent d-flex flex-wrap gap-2 justify-content-between align-items-center">
                    <div class="input-group" style="max-width:300px">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" id="searchInput" placeholder="Search products...">
                    </div>
                    <button class="btn btn-gold" onclick="openAddModal()"><i class="bi bi-plus-lg me-1"></i>Add Product</button>
                </div>
                <div class="card-body p-0"><div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Rate/g</th><th>Actions</th></tr></thead>
                        <tbody id="productTable"></tbody>
                    </table>
                </div></div>
            </div>`;

        async function loadProducts(search = '') {
            try {
                const endpoint = search ? `/products?search=${encodeURIComponent(search)}` : '/products';
                const res = await Api.get(endpoint);
                products = res.data;
                renderTable();
            } catch (err) { showToast(err.message, 'error'); }
        }

        function renderTable() {
            document.getElementById('productTable').innerHTML = products.length
                ? products.map(p => `<tr>
                    <td>${p.id}</td><td>${p.productName}</td><td><span class="badge bg-secondary">${p.category}</span></td>
                    <td>${formatCurrency(p.currentRate)}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="editProduct(${p.id})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct(${p.id})"><i class="bi bi-trash"></i></button>
                    </td></tr>`).join('')
                : '<tr><td colspan="5" class="text-center text-muted py-4">No products found</td></tr>';
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add Product';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            modal.show();
        }

        function editProduct(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('productId').value = p.id;
            document.getElementById('productName').value = p.productName;
            document.getElementById('category').value = p.category;
            document.getElementById('currentRate').value = p.currentRate;
            document.getElementById('description').value = p.description || '';
            modal.show();
        }

        async function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            try {
                await Api.delete(`/products/${id}`);
                showToast('Product deleted');
                loadProducts();
            } catch (err) { showToast(err.message, 'error'); }
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            const body = {
                productName: document.getElementById('productName').value,
                category: document.getElementById('category').value,
                currentRate: parseFloat(document.getElementById('currentRate').value),
                description: document.getElementById('description').value
            };
            try {
                if (id) await Api.put(`/products/${id}`, body);
                else await Api.post('/products', body);
                modal.hide();
                showToast(id ? 'Product updated' : 'Product created');
                loadProducts();
            } catch (err) { showToast(err.message, 'error'); }
        });

        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => loadProducts(e.target.value), 300);
        });

        loadProducts();
    </script>
</body>
</html>
